<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BetWise AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#07090d;color:#dde8e0;font-family:Georgia,serif;min-height:100vh;padding-bottom:60px;}
.gb{position:fixed;inset:0;z-index:0;pointer-events:none;
background-image:linear-gradient(rgba(0,230,118,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,230,118,0.025) 1px,transparent 1px);
background-size:36px 36px;}
#app{max-width:720px;margin:0 auto;padding:0 14px;position:relative;z-index:1;}
.card{background:#0d1318;border:1px solid rgba(0,230,118,0.14);border-radius:10px;}
.btn{border:none;border-radius:6px;padding:10px 18px;font-weight:700;font-size:0.88rem;cursor:pointer;font-family:Georgia,serif;}
.btn-green{background:#00e676;color:#000;}
.btn-purple{background:linear-gradient(135deg,#1a237e,#4a148c);color:#fff;}
.btn-gold{background:#ffd600;color:#000;}
.btn-outline-green{background:#0d1318;color:#00e676;border:1px solid rgba(0,230,118,0.3);}
.btn-outline-red{background:#0d1318;color:#ff5252;border:1px solid rgba(255,82,82,0.2);}
input,select{background:#121a22;border:1px solid rgba(0,230,118,0.22);color:#dde8e0;padding:10px 13px;font-size:0.88rem;border-radius:6px;outline:none;font-family:Georgia,serif;width:100%;}
label{font-size:0.62rem;color:#4a6355;letter-spacing:3px;text-transform:uppercase;margin-bottom:5px;display:block;}
.tab-bar{display:flex;gap:2px;border-bottom:1px solid rgba(0,230,118,0.1);margin-bottom:22px;}
.tab{background:none;border:none;color:#4a6355;font-size:0.8rem;padding:8px 11px;cursor:pointer;font-family:Georgia,serif;border-bottom:2px solid transparent;margin-bottom:-1px;}
.tab.active{color:#00e676;font-weight:700;border-bottom:2px solid #00e676;}
.section-title{font-size:0.6rem;color:#4a6355;letter-spacing:3px;text-transform:uppercase;display:flex;align-items:center;gap:10px;margin:18px 0 10px;}
.section-title::after{content:'';flex:1;height:1px;background:rgba(0,230,118,0.1);}
.tip-card{background:linear-gradient(135deg,rgba(26,35,126,0.25),rgba(74,20,140,0.14));border:1px solid rgba(255,255,255,0.09);border-radius:10px;padding:16px;margin-bottom:12px;}
.match-card{padding:10px 14px;margin-bottom:7px;}
.conf-bar-bg{flex:1;height:5px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;}
.hidden{display:none;}
.flex{display:flex;}.gap8{gap:8px;}.gap10{gap:10px;}.wrap{flex-wrap:wrap;}.center{align-items:center;}.between{justify-content:space-between;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.stat-box{padding:12px 8px;text-align:center;}
.stat-num{font-size:1.8rem;font-weight:900;color:#00e676;line-height:1;}
.stat-lbl{font-size:0.6rem;color:#4a6355;letter-spacing:2px;text-transform:uppercase;margin-top:3px;}
.msg{padding:12px 15px;border-radius:10px;font-size:0.81rem;margin-bottom:14px;}
.msg-ok{color:#00e676;border:1px solid rgba(0,230,118,0.25);background:#0d1318;}
.msg-warn{color:#ff9800;border:1px solid rgba(255,152,0,0.3);background:#0d1318;}
.msg-err{color:#ff5252;border:1px solid rgba(255,82,82,0.25);background:#0d1318;}
.empty{text-align:center;padding:55px 20px;color:#4a6355;}
.empty-icon{font-size:2.8rem;margin-bottom:10px;}
.empty-title{font-weight:700;font-size:1.1rem;letter-spacing:2px;margin-bottom:6px;}
.row-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
</style>
</head>
<body>
<div class="gb"></div>
<div id="app"></div>

<script>
const API_KEY  = "d17d9fa694msh0cd92fe835223c6p1ddef1jsn4bcba1e84d48";
const API_HOST = "free-api-live-football-data.p.rapidapi.com";
const APP_PWD  = "betwise2024";
const TODAY    = new Date().toISOString().split("T")[0];
const IS_LIVE  = window.location.hostname.includes("github.io") ||
                 window.location.hostname.includes("netlify") ||
                 window.location.hostname.includes("vercel");

let STATE = {
  page:"login", tab:"tips",
  date:TODAY, matches:[], tips:[], fetching:false, analysing:false,
  msg:"", msgType:"", isPreview:false, minConf:75, copied:false,
  mHome:"", mAway:"", mLeague:"", mTime:"", mList:[], mTips:[], mLoading:false, mCopied:false,
  history: sGet("bw_hist",[]),
  brand: sGet("bw_brand","BetWise AI"),
  brandOk:false,
  pwd:""
};

function sGet(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function sSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function fmtDate(d){try{return new Date(d).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});}catch{return d;}}
function confCol(c){return c>=88?"#ffd600":c>=80?"#00e676":"#42a5f5";}
function normMatch(m){return{
  home:m.home?.name||m.homeTeam?.name||m.home_team||m.home||"Home Team",
  away:m.away?.name||m.awayTeam?.name||m.away_team||m.away||"Away Team",
  league:m.league?.name||m.competition?.name||m.league_name||m.league||"Football",
  time:String(m.time||m.kickoff||m.match_time||"--:--").slice(0,5)
};}

function set(patch){Object.assign(STATE,patch);render();}
function render(){document.getElementById("app").innerHTML = STATE.page==="login"?loginHTML():mainHTML();}

// ── LOGIN PAGE ──
function loginHTML(){
  return `
  <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px;">
    <div class="card" style="padding:36px;width:100%;max-width:360px;text-align:center;">
      <div style="font-size:2.6rem;font-weight:900;color:#00e676;text-shadow:0 0 30px rgba(0,230,118,0.5);letter-spacing:2px;line-height:1;margin-bottom:4px;">
        Bet<span style="color:#ffd600">Wise</span>
      </div>
      <div style="font-size:0.65rem;color:#4a6355;letter-spacing:3px;text-transform:uppercase;margin-bottom:32px;">
        Personal AI Football Analyst
      </div>
      <label>Password</label>
      <input type="password" id="pwdInput" placeholder="Enter password" value="${STATE.pwd}"
        style="text-align:center;margin-bottom:14px;font-size:1.05rem;letter-spacing:3px;"
        onkeydown="if(event.key==='Enter')doLogin()"/>
      ${STATE.pwdErr?`<div style="color:#ff5252;font-size:0.8rem;margin-bottom:12px;">❌ Wrong password. Try again.</div>`:""}
      <button class="btn btn-green" style="width:100%;font-size:1rem;padding:13px;" onclick="doLogin()">Enter →</button>
      <div style="font-size:0.65rem;color:#4a6355;margin-top:18px;">Default: <strong style="color:#00e676">betwise2024</strong></div>
    </div>
  </div>`;
}

function doLogin(){
  const v = document.getElementById("pwdInput")?.value||"";
  if(v===APP_PWD){set({page:"main",pwdErr:false});}
  else set({pwdErr:true,pwd:v});
}

// ── MAIN PAGE ──
function mainHTML(){
  return `
  <div style="padding-top:0;">
    <!-- HEADER -->
    <div style="padding:22px 0 16px;border-bottom:1px solid rgba(0,230,118,0.12);margin-bottom:20px;">
      <div class="flex between center">
        <div>
          <div style="font-size:2rem;font-weight:900;color:#00e676;text-shadow:0 0 20px rgba(0,230,118,0.4);letter-spacing:2px;line-height:1;">${STATE.brand}</div>
          <div style="font-size:0.6rem;color:#4a6355;letter-spacing:3px;text-transform:uppercase;margin-top:3px;">1.2–1.5 Odds · Daily AI Tips</div>
        </div>
        <div style="display:flex;align-items:center;gap:5px;background:rgba(255,23,68,0.1);border:1px solid rgba(255,23,68,0.25);color:#ff5252;font-size:0.62rem;font-weight:700;letter-spacing:2px;padding:5px 10px;border-radius:3px;">
          <span style="width:5px;height:5px;background:#ff5252;border-radius:50%;display:inline-block;"></span>LIVE AI
        </div>
      </div>
    </div>

    <!-- TABS -->
    <div class="tab-bar">
      <button class="tab ${STATE.tab==="tips"?"active":""}" onclick="set({tab:'tips'})">⚽ Tips</button>
      <button class="tab ${STATE.tab==="manual"?"active":""}" onclick="set({tab:'manual'})">✏️ Manual</button>
      <button class="tab ${STATE.tab==="history"?"active":""}" onclick="set({tab:'history'})">📋 History</button>
      <button class="tab ${STATE.tab==="settings"?"active":""}" onclick="set({tab:'settings'})">⚙️ Settings</button>
    </div>

    <!-- TAB CONTENT -->
    ${STATE.tab==="tips"    ? tipsTab()    : ""}
    ${STATE.tab==="manual"  ? manualTab()  : ""}
    ${STATE.tab==="history" ? historyTab() : ""}
    ${STATE.tab==="settings"? settingsTab(): ""}
  </div>`;
}

// ── TIPS TAB ──
function tipsTab(){
  const ftips = STATE.tips.filter(t=>!t.error&&t.confidence>=STATE.minConf);
  const avgConf = ftips.length?Math.round(ftips.reduce((a,t)=>a+t.confidence,0)/ftips.length):null;
  return `
  <div>
    <!-- Controls -->
    <div class="flex gap10 wrap" style="margin-bottom:14px;align-items:flex-end;">
      <div style="flex:1;min-width:130px;">
        <label>Date</label>
        <input type="date" value="${STATE.date}" onchange="set({date:this.value})"/>
      </div>
      <div style="min-width:110px;">
        <label>Min Confidence</label>
        <select onchange="set({minConf:+this.value})">
          ${[70,75,80,85,88,90].map(v=>`<option value="${v}" ${STATE.minConf===v?"selected":""}>${v}%+</option>`).join("")}
        </select>
      </div>
      <button class="btn btn-green" onclick="fetchMatches()" ${STATE.fetching?"disabled":""} style="opacity:${STATE.fetching?0.5:1};white-space:nowrap;padding:10px 20px;">
        ${STATE.fetching?"⏳ Loading...":"⚽ Fetch Matches"}
      </button>
    </div>

    ${STATE.msg?`<div class="msg msg-${STATE.msgType}">${STATE.msg}${STATE.isPreview?`<div style="margin-top:8px;font-size:0.73rem;color:#4a6355;">💡 Tap <strong style="color:#ffd600">✏️ Manual</strong> tab to add matches and get tips now.</div>`:""}
    </div>`:""}

    ${STATE.matches.length>0?`
    <div class="grid3" style="margin-bottom:14px;">
      <div class="card stat-box"><div class="stat-num">${STATE.matches.length}</div><div class="stat-lbl">Matches</div></div>
      <div class="card stat-box"><div class="stat-num">${ftips.length||STATE.tips.length}</div><div class="stat-lbl">Tips</div></div>
      <div class="card stat-box"><div class="stat-num">${avgConf?avgConf+"%":"—"}</div><div class="stat-lbl">Avg Conf</div></div>
    </div>`:""}

    ${STATE.matches.length>0&&!STATE.analysing&&STATE.tips.length===0?`
    <button class="btn btn-purple" style="width:100%;padding:14px;font-size:0.98rem;margin-bottom:16px;" onclick="runAI('tips')">
      🤖 AI Deep Analyse All Matches
    </button>`:""}

    ${STATE.isPreview&&STATE.matches.length===0&&!STATE.fetching?`
    <div class="card" style="padding:22px;margin-bottom:16px;text-align:center;border-color:rgba(255,152,0,0.2);">
      <div style="font-size:1.8rem;margin-bottom:8px;">🔌</div>
      <div style="font-weight:700;color:#ff9800;margin-bottom:8px;font-size:1rem;">Live Data Not Available Here</div>
      <div style="font-size:0.8rem;color:#4a6355;line-height:1.8;">
        Use <strong style="color:#ffd600">✏️ Manual</strong> tab to add today's matches.<br/>
        On GitHub Pages, real matches load automatically.
      </div>
    </div>`:""}

    ${STATE.analysing?`
    <div class="card" style="padding:30px;text-align:center;margin-bottom:16px;">
      <div style="font-size:2.2rem;margin-bottom:8px;">🤖</div>
      <div style="color:#ce93d8;font-weight:700;margin-bottom:5px;font-size:1rem;">AI is analysing all matches...</div>
      <div style="font-size:0.75rem;color:#4a6355;">Checking form · H2H · Goals stats · Home/Away records</div>
    </div>`:""}

    ${ftips.length>0?`
    <div class="section-title">🏆 Premium Tips (${ftips.length})</div>
    <div class="flex gap8 wrap" style="margin-bottom:14px;">
      <button class="btn btn-gold" onclick="copyWA('tips')">${STATE.copied?"✅ Copied!":"📲 Copy for WhatsApp"}</button>
      <button class="btn btn-outline-green" onclick="saveHistory('Auto')">💾 Save</button>
      <button class="btn btn-outline-red" onclick="resetTips()">🔄 Reset</button>
    </div>
    ${ftips.map(t=>tipCardHTML(t)).join("")}
    ${STATE.tips.length>ftips.length?`<div style="font-size:0.75rem;color:#4a6355;text-align:center;margin-top:6px;">${STATE.tips.length-ftips.length} tips below ${STATE.minConf}% hidden</div>`:""}
    `:""}

    ${STATE.tips.length>0&&STATE.tips[0]?.error?`<div class="card msg msg-err">❌ AI failed. Please try again.</div>`:""}

    ${STATE.matches.length>0?`
    <div class="section-title">Fixtures (${STATE.matches.length})</div>
    ${STATE.matches.slice(0,30).map(m=>{const n=normMatch(m);return`
    <div class="card match-card flex between center">
      <div>
        <div style="font-size:0.6rem;color:#4a6355;margin-bottom:3px;">🏆 ${n.league}</div>
        <div style="font-weight:700;font-size:0.88rem;">${n.home} <span style="color:#4a6355">vs</span> ${n.away}</div>
      </div>
      <div style="color:#ffd600;font-weight:900;font-family:monospace;font-size:0.9rem;flex-shrink:0;">${n.time}</div>
    </div>`;}).join("")}`:""}

    ${STATE.matches.length===0&&!STATE.fetching&&!STATE.isPreview?`
    <div class="empty"><div class="empty-icon">🎯</div><div class="empty-title">READY TO ANALYSE</div><div style="font-size:0.82rem;">Pick a date and tap Fetch Matches</div></div>`:""}
  </div>`;
}

// ── MANUAL TAB ──
function manualTab(){
  const fmtips = STATE.mTips.filter(t=>!t.error&&t.confidence>=STATE.minConf);
  return `
  <div>
    <div class="card" style="padding:18px;margin-bottom:14px;">
      <label style="margin-bottom:14px;display:block;">✏️ ADD MATCH MANUALLY</label>
      <div class="row-grid" style="margin-bottom:12px;">
        <div><label>Home Team</label><input id="mHome" value="${STATE.mHome}" placeholder="e.g. Arsenal" oninput="STATE.mHome=this.value"/></div>
        <div><label>Away Team</label><input id="mAway" value="${STATE.mAway}" placeholder="e.g. Chelsea" oninput="STATE.mAway=this.value"/></div>
        <div><label>League</label><input id="mLeague" value="${STATE.mLeague}" placeholder="e.g. Premier League" oninput="STATE.mLeague=this.value"/></div>
        <div><label>Time</label><input id="mTime" value="${STATE.mTime}" placeholder="e.g. 20:00" oninput="STATE.mTime=this.value"/></div>
      </div>
      <button class="btn btn-green" onclick="addManualMatch()">+ Add Match</button>
    </div>

    ${STATE.mList.length>0?`
    <div class="section-title">Added Matches (${STATE.mList.length})</div>
    ${STATE.mList.map((m,i)=>`
    <div class="card match-card flex between center">
      <div>
        <div style="font-size:0.6rem;color:#4a6355;margin-bottom:3px;">🏆 ${m.league}</div>
        <div style="font-weight:700;font-size:0.88rem;">${m.home} vs ${m.away}</div>
      </div>
      <div class="flex center gap8">
        <span style="color:#ffd600;font-family:monospace;font-size:0.85rem;">${m.time}</span>
        <button class="btn btn-outline-red" style="padding:4px 9px;font-size:0.75rem;" onclick="removeManual(${i})">✕</button>
      </div>
    </div>`).join("")}

    ${!STATE.mLoading&&STATE.mTips.length===0?`
    <button class="btn btn-purple" style="width:100%;padding:13px;font-size:0.95rem;margin:10px 0 14px;" onclick="runAI('manual')">
      🤖 AI Analyse These Matches
    </button>`:""}

    ${STATE.mLoading?`
    <div class="card" style="padding:24px;text-align:center;margin-top:10px;">
      <div style="font-size:1.8rem;margin-bottom:6px;">🤖</div>
      <div style="color:#ce93d8;font-weight:700;">Analysing your matches...</div>
    </div>`:""}

    ${fmtips.length>0?`
    <div class="section-title">Tips (${fmtips.length})</div>
    <div class="flex gap8 wrap" style="margin-bottom:14px;">
      <button class="btn btn-gold" onclick="copyWA('manual')">${STATE.mCopied?"✅ Copied!":"📲 Copy for WhatsApp"}</button>
      <button class="btn btn-outline-green" onclick="saveHistory('Manual');set({mTips:[],mList:[]})">💾 Save & Clear</button>
    </div>
    ${fmtips.map(t=>tipCardHTML(t)).join("")}`:""}

    ${STATE.mTips.length>0&&STATE.mTips[0]?.error?`<div class="card msg msg-err">❌ AI failed. Please try again.</div>`:""}
    `:`<div class="empty"><div class="empty-icon">✏️</div><div class="empty-title">ADD MATCHES MANUALLY</div><div style="font-size:0.8rem;">Use any time — even without live API</div></div>`}
  </div>`;
}

// ── HISTORY TAB ──
function historyTab(){
  const allT   = STATE.history.flatMap(e=>e.tips.filter(t=>!t.error));
  const graded = allT.filter(t=>t.result==="win"||t.result==="loss");
  const wins   = graded.filter(t=>t.result==="win").length;
  const wr     = graded.length?Math.round(wins/graded.length*100):null;
  return `
  <div>
    ${graded.length>0?`
    <div class="card flex between center" style="padding:16px 18px;margin-bottom:18px;border-color:rgba(0,230,118,0.25);">
      <div>
        <div style="font-size:0.6rem;color:#4a6355;letter-spacing:3px;text-transform:uppercase;margin-bottom:5px;">Overall Accuracy</div>
        <div style="font-size:2.2rem;font-weight:900;line-height:1;color:${wr>=80?"#00e676":wr>=65?"#ffd600":"#ff5252"}">${wr}%</div>
        <div style="font-size:0.72rem;color:#4a6355;margin-top:4px;">${wins}W / ${graded.length-wins}L of ${graded.length} graded</div>
      </div>
      <div style="font-size:3rem;">${wr>=80?"🔥":wr>=65?"📈":"📉"}</div>
    </div>`:""}

    ${STATE.history.length===0?`
    <div class="empty"><div class="empty-icon">📋</div><div class="empty-title">NO HISTORY YET</div><div style="font-size:0.8rem;">Save tips from Tips or Manual tabs</div></div>
    `:`
    <div style="display:flex;justify-content:flex-end;margin-bottom:12px;">
      <button class="btn btn-outline-red" style="padding:6px 12px;font-size:0.75rem;" onclick="clearHistory()">🗑 Clear All</button>
    </div>
    ${STATE.history.map((entry,ei)=>`
    <div class="card" style="margin-bottom:14px;overflow:hidden;">
      <div style="padding:12px 14px;border-bottom:1px solid rgba(0,230,118,0.08);display:flex;justify-content:space-between;align-items:center;">
        <div>
          <div style="font-weight:700;font-size:0.92rem;">📅 ${fmtDate(entry.date)}</div>
          <div style="font-size:0.65rem;color:#4a6355;margin-top:2px;">${entry.label} · ${entry.tips.length} tips</div>
        </div>
        <div style="font-size:0.65rem;color:#4a6355;">${entry.tips.filter(t=>t.result==="win").length}W / ${entry.tips.filter(t=>t.result==="loss").length}L</div>
      </div>
      ${entry.tips.filter(t=>!t.error).map((t,ti)=>`
      <div style="padding:10px 14px;border-bottom:1px solid rgba(0,230,118,0.05);display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;">
        <div style="flex:1;min-width:0;">
          <div style="font-size:0.8rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${t.match}</div>
          <div style="font-size:0.7rem;color:#00e676;margin-top:2px;">${t.tip} @ ${t.odds}</div>
        </div>
        <div style="display:flex;gap:5px;flex-shrink:0;">
          <button class="btn" style="padding:4px 9px;font-size:0.7rem;background:${t.result==="win"?"#00e676":"#121a22"};color:${t.result==="win"?"#000":"#4a6355"};border:1px solid rgba(0,230,118,0.3);" onclick="markResult(${entry.id},${ti},'win')">✅</button>
          <button class="btn" style="padding:4px 9px;font-size:0.7rem;background:${t.result==="loss"?"#ff5252":"#121a22"};color:${t.result==="loss"?"#000":"#4a6355"};border:1px solid rgba(255,82,82,0.3);" onclick="markResult(${entry.id},${ti},'loss')">❌</button>
          <button class="btn" style="padding:4px 9px;font-size:0.7rem;background:${t.result==="void"?"#607d6b":"#121a22"};color:${t.result==="void"?"#000":"#4a6355"};border:1px solid rgba(96,125,107,0.3);" onclick="markResult(${entry.id},${ti},'void')">➖</button>
        </div>
      </div>`).join("")}
    </div>`).join("")}`}
  </div>`;
}

// ── SETTINGS TAB ──
function settingsTab(){
  const allT   = STATE.history.flatMap(e=>e.tips.filter(t=>!t.error));
  const graded = allT.filter(t=>t.result==="win"||t.result==="loss");
  const wins   = graded.filter(t=>t.result==="win").length;
  const wr     = graded.length?Math.round(wins/graded.length*100):null;
  return `
  <div>
    <div class="card" style="padding:20px;margin-bottom:14px;">
      <label style="margin-bottom:14px;display:block;">🎨 YOUR BRAND</label>
      <label>Brand Name</label>
      <input id="brandInput" value="${STATE.brand}" placeholder="e.g. King Tips AI" style="margin-bottom:12px;" oninput="STATE.brand=this.value"/>
      <button class="btn btn-green" onclick="saveBrand()">${STATE.brandOk?"✅ Saved!":"Save Brand Name"}</button>
      <div style="font-size:0.72rem;color:#4a6355;margin-top:10px;">Appears in header and WhatsApp tips.</div>
    </div>

    <div class="card" style="padding:20px;margin-bottom:14px;">
      <label style="margin-bottom:14px;display:block;">🔌 API STATUS</label>
      <div style="font-size:0.82rem;line-height:2;">
        Mode: <strong style="color:${IS_LIVE?"#00e676":"#ff9800"}">${IS_LIVE?"🟢 LIVE — Real match data active":"🟡 Preview — Use Manual tab"}</strong><br>
        <span style="font-size:0.72rem;color:#4a6355;">${IS_LIVE?"Live API fetching real matches.":"On GitHub Pages this shows 🟢 LIVE."}</span>
      </div>
    </div>

    <div class="card" style="padding:20px;margin-bottom:14px;">
      <label style="margin-bottom:14px;display:block;">🔑 LOGIN</label>
      <div style="font-size:0.82rem;color:#4a6355;line-height:1.8;">
        Password: <span style="color:#00e676;font-family:monospace;font-weight:700;">${APP_PWD}</span>
      </div>
    </div>

    <div class="card" style="padding:20px;">
      <label style="margin-bottom:14px;display:block;">📊 STATS</label>
      <div style="font-size:0.82rem;line-height:2.1;">
        Sessions saved: <strong style="color:#00e676;">${STATE.history.length}</strong><br>
        Total tips: <strong style="color:#00e676;">${allT.length}</strong><br>
        Graded: <strong style="color:#00e676;">${graded.length}</strong><br>
        Win rate: <strong style="color:${wr>=80?"#00e676":wr?"#ffd600":"#4a6355"}">${wr!=null?wr+"%":"Not enough data yet"}</strong>
      </div>
    </div>
  </div>`;
}

// ── TIP CARD HTML ──
function tipCardHTML(t){
  const col = confCol(t.confidence);
  return `
  <div class="tip-card">
    <div style="font-size:0.6rem;color:#9575cd;letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;">🏆 ${t.league}</div>
    <div style="font-weight:700;font-size:1rem;margin-bottom:10px;">${t.match}</div>
    <div class="flex center gap8 wrap" style="margin-bottom:10px;">
      <div style="background:${t.confidence>=88?"rgba(255,214,0,0.2)":"rgba(0,230,118,0.2)"};border:1px solid ${t.confidence>=88?"rgba(255,214,0,0.5)":"rgba(0,230,118,0.5)"};color:${t.confidence>=88?"#ffd600":"#00e676"};font-size:0.8rem;font-weight:700;padding:5px 11px;border-radius:4px;text-transform:uppercase;">✅ ${t.tip}</div>
      <div style="background:#121a22;border:1px solid rgba(255,255,255,0.09);color:#fff;font-family:monospace;font-weight:900;font-size:1.05rem;padding:4px 13px;border-radius:4px;">@ ${t.odds}</div>
      ${t.confidence>=88?`<span style="font-size:0.7rem;color:#ffd600;font-weight:700;">⭐ BEST BET</span>`:""}
    </div>
    <div class="flex center gap10" style="margin-bottom:8px;">
      <div style="font-size:0.6rem;color:#4a6355;width:72px;flex-shrink:0;">Confidence</div>
      <div class="conf-bar-bg"><div style="height:100%;width:${t.confidence}%;background:linear-gradient(90deg,${col}88,${col});border-radius:3px;"></div></div>
      <div style="font-weight:900;color:${col};width:38px;text-align:right;font-size:0.9rem;">${t.confidence}%</div>
    </div>
    <div style="font-size:0.79rem;color:#607d6b;line-height:1.65;padding-top:8px;border-top:1px solid rgba(255,255,255,0.05);">${t.reasoning}</div>
  </div>`;
}

// ── ACTIONS ──
async function fetchMatches(){
  set({fetching:true,msg:"",matches:[],tips:[],isPreview:false});
  if(!IS_LIVE){
    set({fetching:false,isPreview:true,msg:"⚠️ PREVIEW — Browser blocks live API here. Use ✏️ Manual tab to add matches and get AI tips. On GitHub Pages, live data loads automatically.",msgType:"warn"});
    return;
  }
  try{
    const res = await fetch("https://"+API_HOST+"/football-get-matches-by-date?date="+STATE.date,
      {headers:{"x-rapidapi-key":API_KEY,"x-rapidapi-host":API_HOST}});
    if(!res.ok) throw new Error("API error HTTP "+res.status);
    const json = await res.json();
    const arr  = json.response||json.data||json.matches||json.results||(Array.isArray(json)?json:null);
    if(arr&&arr.length>0){
      set({fetching:false,matches:arr,msg:"✅ "+arr.length+" live matches loaded for "+fmtDate(STATE.date),msgType:"ok"});
    } else {
      set({fetching:false,msg:"⚠️ No matches found for "+fmtDate(STATE.date)+". Try another date.",msgType:"warn"});
    }
  } catch(e){
    set({fetching:false,msg:"❌ "+e.message,msgType:"err"});
  }
}

async function runAI(mode){
  const src = mode==="tips"?STATE.matches:STATE.mList;
  if(!src.length) return;
  if(mode==="tips") set({analysing:true,tips:[]});
  else set({mLoading:true,mTips:[]});

  const lines = src.slice(0,18).map((m,i)=>{
    const n=normMatch(m);
    return (i+1)+". "+n.home+" vs "+n.away+" ("+n.league+")";
  }).join("\n");

  const prompt = `You are an elite football betting analyst with 20 years experience. Find the safest highest-confidence tips targeting odds 1.15-1.55.

MATCHES FOR ${fmtDate(STATE.date)}:
${lines}

Select BEST 6 tips. Markets: Over 0.5 Goals, Over 1.5 Goals, Double Chance 1X, Double Chance X2, Double Chance 12, Home Win, Draw No Bet Home, Draw No Bet Away, BTTS - No.

Respond ONLY as valid JSON array, nothing else:
[{"match":"name","league":"league","tip":"market","odds":"1.35","confidence":85,"reasoning":"Two sentences."}]`;

  try{
    const res  = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1400,
        messages:[{role:"user",content:prompt}]})
    });
    const data = await res.json();
    const raw  = (data.content||[]).map(b=>b.text||"").join("");
    const s=raw.indexOf("["),e=raw.lastIndexOf("]");
    if(s===-1) throw new Error("no array");
    const result = JSON.parse(raw.slice(s,e+1));
    if(mode==="tips") set({analysing:false,tips:result});
    else set({mLoading:false,mTips:result});
  } catch(err){
    if(mode==="tips") set({analysing:false,tips:[{error:true}]});
    else set({mLoading:false,mTips:[{error:true}]});
  }
}

function addManualMatch(){
  const h=document.getElementById("mHome")?.value||STATE.mHome;
  const a=document.getElementById("mAway")?.value||STATE.mAway;
  const l=document.getElementById("mLeague")?.value||STATE.mLeague;
  const t=document.getElementById("mTime")?.value||STATE.mTime;
  if(!h||!a) return;
  STATE.mList=[...STATE.mList,{home:h,away:a,league:l||"Football",time:t||"--:--"}];
  STATE.mHome="";STATE.mAway="";STATE.mLeague="";STATE.mTime="";
  render();
}

function removeManual(i){
  STATE.mList=STATE.mList.filter((_,j)=>j!==i);
  render();
}

function resetTips(){
  set({tips:[],matches:[],msg:"",isPreview:false});
}

function saveHistory(label){
  const tipsList = label==="Auto"
    ? STATE.tips.filter(t=>!t.error&&t.confidence>=STATE.minConf)
    : STATE.mTips.filter(t=>!t.error&&t.confidence>=STATE.minConf);
  const entry={id:Date.now(),date:STATE.date,label,tips:tipsList};
  const upd=[entry,...STATE.history].slice(0,60);
  STATE.history=upd; sSet("bw_hist",upd); render();
}

function markResult(eid,ti,result){
  STATE.history=STATE.history.map(e=>{
    if(e.id!==eid) return e;
    return{...e,tips:e.tips.map((t,i)=>i===ti?{...t,result}:t)};
  });
  sSet("bw_hist",STATE.history); render();
}

function clearHistory(){
  STATE.history=[]; sSet("bw_hist",[]); render();
}

function buildWA(tipsList){
  const hdr="🏆 *"+STATE.brand+" — Daily Tips*\n📅 "+fmtDate(STATE.date)+"\n"+"─".repeat(26)+"\n\n";
  const body=tipsList.filter(t=>!t.error&&t.confidence>=STATE.minConf)
    .map((t,i)=>"*"+(i+1)+". "+t.match+"*\n✅ *"+t.tip+"* @ "+t.odds+"\n📊 Confidence: "+t.confidence+"%\n💬 "+t.reasoning)
    .join("\n\n");
  return hdr+body+"\n\n"+"─".repeat(26)+"\n_"+STATE.brand+" · Bet responsibly_";
}

async function copyWA(mode){
  const tipsList = mode==="tips"
    ? STATE.tips.filter(t=>!t.error&&t.confidence>=STATE.minConf)
    : STATE.mTips.filter(t=>!t.error&&t.confidence>=STATE.minConf);
  try{ await navigator.clipboard.writeText(buildWA(tipsList)); } catch{}
  if(mode==="tips"){ STATE.copied=true; render(); setTimeout(()=>{STATE.copied=false;render();},2500); }
  else { STATE.mCopied=true; render(); setTimeout(()=>{STATE.mCopied=false;render();},2500); }
}

function saveBrand(){
  const v=document.getElementById("brandInput")?.value||STATE.brand;
  STATE.brand=v; sSet("bw_brand",v); STATE.brandOk=true; render();
  setTimeout(()=>{STATE.brandOk=false;render();},2000);
}

// ── START ──
render();
</script>
