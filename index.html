if(!res.ok)throw new Error("HTTP "+res.status);
const json=await res.json();
const arr=json.response||json.data||json.matches||json.results||(Array.isArray(json)?json:null);
if(arr&&arr.length>0){setMatches(arr);setMsg("✅ "+arr.length+" live matches loaded for "+fmtDate(date));}
else setMsg("⚠️ No matches found for "+fmtDate(date)+". Try another date.");

}
async function analyse(src,setSrc,setLoad){
if(!src.length)return;
setLoad(true);setSrc([]);
const lines=src.slice(0,18).map((m,i)=>{const n=norm(m);return(i+1)+". "+n.home+" vs "+n.away+" ("+n.league+")";}).join("\n");
const prompt="You are an elite football betting analyst. Pick the BEST 6 tips from these matches targeting odds 1.15-1.55. Safe markets only: Over 0.5/1.5 Goals, Double Chance 1X/X2/12, Home Win, Draw No Bet, BTTS No.\n\nMATCHES ("+fmtDate(date)+"):\n"+lines+"\n\nRespond ONLY as a valid JSON array. No markdown. No text outside array:\n[{\"match\":\"...\",\"league\":\"...\",\"tip\":\"...\",\"odds\":\"1.35\",\"confidence\":85,\"reasoning\":\"2 sentences.\"}]";
try{
const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1200,messages:[{role:"user",content:prompt}]})});
const data=await res.json();
const raw=(data.content||[]).map(b=>b.text||"").join("");
const s=raw.indexOf("["),e=raw.lastIndexOf("]");
if(s===-1)throw new Error("no json");
setSrc(JSON.parse(raw.slice(s,e+1)));
}catch{setSrc([{error:true}]);}
setLoad(false);
}

const e={id:Date.now(),date,label,tips:tipsList};
const updated=[e,...history].slice(0,60);
setHistory(updated);sSet("bw_hist",updated);
}
function markResult(eid,ti,result){
const updated=history.map(e=>{if(e.id!==eid)return e;return{...e,tips:e.tips.map((t,i)=>i===ti?{...t,result}:t)};});
setHistory(updated);sSet("bw_hist",updated);
}

</div>
</div>

</div>

</div>}

<div>

</div>
<div style={{textAlign:"right"}}>
<div style={{fontSize:"0.6rem",color:"#4a6355",letterSpacing:3,textTransform:"uppercase",marginBottom:4}}>Graded Tips</div>
<div style={{fontSize:"1.4rem",fontWeight:900,color:"#00e676"}}>{wins}/{graded.length}</div>
</div>
</div>}
{history.length===0&&<div style={{textAlign:"center",padding:"50px 20px",color:"#4a6355"}}><div style={{fontSize:"2.2rem",marginBottom:10}}>📋</div><div style={{fontWeight:700,fontSize:"1rem",letterSpacing:1}}>NO HISTORY YET</div></div>}
{history.map(e=>(
<div key={e.id} style={{...C.card(),marginBottom:14,overflow:"hidden"}}>
<div style={{background:"rgba(0,230,118,0.08)",padding:"11px 15px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid rgba(0,230,118,0.1)"}}>
<div>
<div style={{fontWeight:700,fontSize:"0.9rem"}}>{e.label}</div>
<div style={{fontSize:"0.65rem",color:"#4a6355",marginTop:2}}>📅 {fmtDate(e.date)}</div>
</div>
<div style={{fontSize:"0.75rem",fontWeight:700,background:"rgba(255,255,255,0.05)",padding:"4px 10px",borderRadius:4}}>{e.tips.length} tips</div>
</div>
<div style={{padding:"12px 15px"}}>
{e.tips.map((t,i)=>(
<div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingBottom:10,marginBottom:10,borderBottom:i<e.tips.length-1?"1px solid rgba(255,255,255,0.04)":"none"}}>
<div style={{flex:1}}>
<div style={{fontSize:"0.8rem",fontWeight:700,marginBottom:4}}>{t.match}</div>
<div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
<span style={C.tag(t.confidence>=88?"#ffd600":"#00e676")}>✅ {t.tip}</span>
<span style={{fontSize:"0.75rem",color:"#4a6355"}}>@ {t.odds}</span>
</div>
</div>
<div style={{display:"flex",gap:6}}>
{t.result?<span style={{fontWeight:900,fontSize:"0.85rem",color:t.result==="win"?"#00e676":"#ff5252"}}>{t.result==="win"?"✅":"❌"}</span>:<div style={{display:"flex",gap:4}}>
<button onClick={()=>markResult(e.id,i,"win")} style={{...C.btn("#00e676","#000",{padding:"4px 8px",fontSize:"0.7rem",fontWeight:900})}} >✓</button>
<button onClick={()=>markResult(e.id,i,"loss")} style={{...C.btn("#ff5252","#fff",{padding:"4px 8px",fontSize:"0.7rem",fontWeight:900})}}>✕</button>
</div>}
</div>
</div>
))}
</div>
</div>
))}
</div>
)}
{tab==="settings"&&(
<div>
<div style={{...C.card(),padding:18,marginBottom:14}}>
<label style={C.lbl}>Brand Name</label>
<div style={{display:"flex",gap:8}}>
<input value={brand} onChange={e=>setBrand(e.target.value)} style={C.inp}/>
<button onClick={()=>{sSet("bw_brand",brand);setBrandSaved(true);setTimeout(()=>setBrandSaved(false),2000);}} style={{...C.btn("#00e676","#000",{whiteSpace:"nowrap"})}}>Save</button>
</div>
{brandSaved&&<div style={{fontSize:"0.75rem",color:"#00e676",marginTop:8}}>✅ Saved!</div>}
</div>
<div style={{...C.card(),padding:18,marginBottom:14}}>
<label style={C.lbl}>About</label>
<div style={{fontSize:"0.85rem",color:"#607d6b",lineHeight:1.8}}>
<p style={{marginBottom:10}}><strong>BetWise AI</strong> is your personal football betting analyst, powered by Claude AI.</p>
<p style={{marginBottom:10}}>🤖 <strong>AI Analysis:</strong> Deep match analysis for confident tips</p>
<p style={{marginBottom:10}}>🏠 <strong>Manual Mode:</strong> Add your own matches and get instant analysis</p>
<p style={{marginBottom:10}}>📊 <strong>Track Results:</strong> Grade tips as wins/losses to track accuracy</p>
<p><strong>Version:</strong> 1.2.0</p>
</div>
</div>
</div>
)}
</div>
</div>
</div>
);
}
const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
